<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style3.css">
    <title>AN appointment</title>
</head>

<body>
    <img src="img/appointment.jpg" alt="AN appointment">
    <div class="form">
        <h1> doctor appointment form </h1>
        <form action="">
            <label for="">Appointment Date :</label> 
            <input type="date" name="date"> <br><br>

            <label for="">Appointment Time :</label> 
            <input type="date" name="date"> <br><br>

            <label for="">Name :</label>
            <input type="text"  name="firstname" placeholder="frist name">
            <input type="text" name="lastname" placeholder="last"><br><br>

            <label for="">Gender :</label><br>
            <input type="radio" name="gender"> male <input type="radio" name="gender">female <br><br>

            <label for="">Phone numder :</label>
            <input type="text" name="phone" placeholder="#####"><br><br>

            <label for="">Address :</label><br>
            <input type="text" name="address" placeholder="city"> <input type="text" name="address" placeholder="state"><br><br>

            <label for="">Your Query :</label>
            <textarea name="query" id="" rows="5" cols="40"></textarea><br><br>

            <label for="">Appointment type :</label>
            <p>select which appointment typs(s) you require  </p>
            <input type="checkbox" name="check">Cervix checkup <br>
            <input type="checkbox" name="check">Heart checkup <br>
            <input type="checkbox" name="check">Eye checkup <br>
            <input type="checkbox" name="check">Hearing checkup <br>

            <input type="submit" name="submit" value="send" class="button">
        </form>
    </div>
</body>

</html>
